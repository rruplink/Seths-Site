<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRC Data Visualizer</title>
    <link rel="icon" type="image/png" href="../SiteIcon.png">
    <style>
      body {
        margin: 0;
        padding: 42px;
        background: #050505;
        color: #ededed;
        font-family: "Courier New", Courier, monospace;
        line-height: 1.55;
      }

      main {
        width: min(1120px, 100%);
      }

      a {
        color: #e8ff8f;
        text-decoration: none;
      }

      a:hover,
      a:focus {
        color: #ededed;
        text-decoration: underline;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 24px;
      }

      h1::before {
        content: "## ";
        color: #666;
      }

      p {
        max-width: 72ch;
        margin: 0 0 18px;
      }

      .preview {
        border: 1px solid #393939;
        background: #0c0c0c;
      }

      .preview iframe {
        display: block;
        width: 100%;
        height: 660px;
        border: 0;
        background: #050505;
      }

      .preview-actions {
        padding: 16px 18px;
        border-top: 1px solid #393939;
      }

      .preview-actions a::before {
        content: "[link] ";
        color: #666;
      }

      @media (max-width: 760px) {
        body {
          padding: 28px 20px 42px;
        }

        .preview iframe {
          height: 560px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p><a href="../index.html">back home</a> / <a href="index.html">all projects</a></p>
      <h1>PRC Data Visualizer</h1>
      <p>
        A standalone web app for exploring PRC-related datasets and visual views.
      </p>
      <div class="preview">
        <iframe
          src="https://prc-data-visualizer.vercel.app/"
          title="PRC Data Visualizer"
          loading="lazy"
        ></iframe>
        <div class="preview-actions">
          <a
            href="https://prc-data-visualizer.vercel.app/"
            target="_blank"
            rel="noreferrer"
          >Open full visualizer</a>
        </div>
      </div>
    </main>
  </body>
</html>
